---
# Editors / IDEs / dev GUIs.
- name: Editor & IDE apps — casks
  community.general.homebrew_cask:
    name: "{{ cask }}"
    state: present
    # Adopt an app already present at the install path instead of erroring.
    install_options: adopt
  loop:
    - cursor             # AI code editor
    - github             # GitHub Desktop
    # - intellij-idea-ce   # JetBrains IntelliJ (Community)
    # - pycharm-ce         # JetBrains PyCharm (Community)
    # - bbedit             # text editor
    - claude             # Claude desktop app
  loop_control:
    loop_var: cask
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed
