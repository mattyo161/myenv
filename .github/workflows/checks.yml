name: Checks

# Fast, host-agnostic verification that runs on every PR and push to main.
# These checks do NOT install software or touch a real machine — they validate
# the playbook structure and our local conventions. macOS-runner end-to-end
# tests can be layered on later.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify playbook & conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Homebrew retry-convention check
        run: python3 scripts/check_homebrew_retries.py

      - name: Playbook syntax check
        run: ansible-playbook -i inventory.ini site.yml --syntax-check
