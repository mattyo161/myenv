---
# Azure extras — AKS authentication via Microsoft Entra ID (Azure AD).
# Uses Microsoft's kubelogin (NOT the int128 core formula of the same name).
- name: Azure extras — kubelogin tap
  community.general.homebrew_tap:
    name: Azure/kubelogin
    state: present
  register: tap_result
  retries: 3
  delay: 15
  until: tap_result is not failed

- name: Azure extras — kubelogin (AKS Entra ID auth for kubectl)
  community.general.homebrew:
    name: Azure/kubelogin/kubelogin
    state: present
  register: formula_result
  retries: 3
  delay: 15
  until: formula_result is not failed
