---
# =============================================================================
# group_vars/all.yml — shared package lists and settings for everyone.
#
# Per-user identity (git_user_name / git_user_email / github_user) lives in
# group_vars/local.yml, which is git-ignored and generated by bootstrap.sh on
# first run. The package lists below are a sensible baseline; trim or extend
# them as needed for your role.
# =============================================================================

# ---- Homebrew taps ----------------------------------------------------------
homebrew_taps:
  - cloudgraphdev/tap
  - siderolabs/tap
  - supabase/tap
  - snowflakedb/snowflake-cli

# ---- Homebrew formulae (CLI tools) ------------------------------------------
homebrew_formulae:
#  - ant
#  - autopsy
  - azure-cli           # Azure CLI (`az`)
  - bash-completion
  - cliclick    # tool to execute mouse clicks on the screen through the cli
#  - ddrescue
  - etcd
  - ffmpeg
  - git
  - k9s
  - kubectx
  - libyaml
  - ntp
  - parallel # xargs on steroids (requires perl)
  - plantuml # PlantUML (UML diagram generator)
  - prek     # Rust pre-commit manager
  - pstree
  - qemu
  - ripgrep
#  - sevenzip
  - starship
#  - stern
#  - telnet
  - tmux
#  - wakeonlan
  - watch
#  - weasyprint
  # PowerPoint Preview Generation
  - libreoffice
  - poppler
  # json TUI - Terminal User Interface
  - jqp
  - jless
#  - fx
  - jtbl

# ---- Homebrew casks: common (installed for everyone) ------------------------
# NOTE: visual-studio-code added so the `code` CLI exists for the vscode role.
homebrew_casks_common:
  - font-fira-code-nerd-font
  - font-meslo-lg-nerd-font
  - google-cloud-sdk    # Google Cloud SDK (`gcloud`, `gsutil`, `bq`)
  - lens                # LENS (Kubernetes IDE)
  - ngrok
  - slack
  - slack-cli
  - utm
  - visual-studio-code
  - basictex
  - docker-desktop
  - vagrant
  - virtualbox
  - snowflake-cli

# ---- Homebrew casks: personal (tagged 'personal'; skip with --skip-tags) ----
homebrew_casks_personal:
  - google-chrome
  - logseq
  - obsidian

# ---- mise managed tools (tool -> version) -----------------------------------
# Versions are "latest" to mirror the current machine. For stricter
# reproducibility, pin specific versions here (e.g. node: "20.19.2").
mise_tools:
  ansible: 13.7.0
  atmos: latest
  aws: latest
  colima: latest        # container runtime + local k8s (k3s) host
  gh: latest
  go: latest
  gomplate: latest
  helm: latest
  java: latest
  jc: latest
  jq: latest
  kubectl: latest
  lima: latest
  node: latest
  # node: 20
  # node: 24
  pandoc: latest
  pipx: latest
  pnpm: latest
  python: latest
  # python: 3.13
  ruby: latest
  talosctl: latest
  terraform: latest
  # terraform: 1.15.1
  # terraform: 1.15.5
  # terraform: 1.5.7
  # terraform: 1.7.4
  terraformer: latest
  uv: latest
  yq: latest

# mise tools whose idiomatic version file (e.g. .python-version) is honored.
mise_idiomatic_version_file_enable_tools:
  - python
  - node
  - terraform

# ---- VS Code extensions -----------------------------------------------------
vscode_extensions:
  - anthropic.claude-code
  - ms-azuretools.vscode-containers
  - ms-azuretools.vscode-docker
  - ms-python.debugpy
  - ms-python.python
  - ms-python.vscode-pylance
  - ms-python.vscode-python-envs
  - nguyenhoanglam.beautiful-dracula
  - renathossain.markdown-runner
