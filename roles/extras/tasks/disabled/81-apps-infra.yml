---
# Infra / Kubernetes / debugging apps that match your stack.
- name: Infra apps — casks
  community.general.homebrew_cask:
    name: "{{ cask }}"
    state: present
    # Adopt an app already present at the install path instead of erroring.
    install_options: adopt
  loop:
    - lens                 # Kubernetes IDE
    # - raspberry-pi-imager  # flash images for your rpi/k3s nodes
    - wireshark            # packet capture / network debugging
    - charles              # HTTP(S) proxy debugging
    # - termius              # SSH client
    - mysqlworkbench       # MySQL GUI
    # - drawio               # architecture diagrams
    - dbeaverlite
    - dbvr
  loop_control:
    loop_var: cask
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed