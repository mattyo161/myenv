---
# =============================================================================
# site.yml — provision a macOS laptop to match the team baseline.
#
# Usage:
#   ansible-playbook site.yml                     # everything
#   ansible-playbook site.yml --skip-tags personal  # omit personal-only apps
#   ansible-playbook site.yml --tags mise         # one layer only
#   ansible-playbook site.yml --check --diff      # dry run
# =============================================================================
- name: Set up macOS laptop
  hosts: local
  gather_facts: true

  pre_tasks:
    - name: Fail early on non-macOS hosts
      ansible.builtin.assert:
        that: ansible_facts['system'] == "Darwin"
        fail_msg: "This playbook only supports macOS."
      tags: always

    - name: Require your identity to be filled in (not the placeholders)
      ansible.builtin.assert:
        that:
          - git_user_name | default('') | trim | length > 0
          - git_user_email | default('') | trim | length > 0
          - github_user | default('') | trim | length > 0
          - git_user_name != "Your Name"
          - git_user_email != "you@example.com"
          - github_user != "your-gh-user"
        fail_msg: >-
          Edit group_vars/all.yml first: set git_user_name, git_user_email, and
          github_user to your own values. They are still the placeholder
          defaults, so aborting before anything is installed or your git identity
          is set incorrectly.
        success_msg: "Identity looks set ({{ git_user_name }} <{{ git_user_email }}>)."
      tags: always

  roles:
    - role: xcode
      tags: xcode
    - role: homebrew
      tags: homebrew
    - role: mise
      tags: mise
    - role: vscode
      tags: vscode
    - role: extras
      tags: extras
    - role: dotfiles
      tags: dotfiles
