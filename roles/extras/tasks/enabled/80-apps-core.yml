---
# Core apps you already carry config for (closes the gap: iTerm2 + Zed configs
# live in this repo / ~/.config but the apps weren't installed by the playbook).
- name: Core apps — casks
  community.general.homebrew_cask:
    name: "{{ cask }}"
    state: present
    # Adopt an app already present at the install path (e.g. you installed it
    # by hand into /Applications) instead of erroring. Makes the task safe to
    # run when an app exists but isn't yet managed by Homebrew.
    install_options: adopt
  loop:
    - iterm2          # terminal (you have ~/.config/iterm2)
    - zed             # editor (you have ~/.config/zed/settings.json)
    - 1password       # password manager (you have ~/.config/1Password)
    - 1password-cli   # `op` CLI — secrets in scripts/automation
  loop_control:
    loop_var: cask
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed
