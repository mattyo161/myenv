---
# Install Homebrew taps, formulae, and casks from group_vars/all.yml.
# Assumes `brew` is already installed (bootstrap.sh guarantees this).

- name: Locate brew executable
  ansible.builtin.stat:
    path: /opt/homebrew/bin/brew
  register: brew_bin

- name: Ensure Homebrew is installed
  ansible.builtin.assert:
    that: brew_bin.stat.exists
    fail_msg: "Homebrew not found at /opt/homebrew/bin/brew. Run bootstrap.sh first."

- name: Add Homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ homebrew_taps }}"
  register: tap_result
  retries: 3
  delay: 15
  until: tap_result is not failed

# Trust every third-party tap we add, so Homebrew will load its formulae and
# casks when HOMEBREW_REQUIRE_TAP_TRUST is set. Trusting the tap covers all of
# its formulae/casks, so there is no separate per-cask trust step. `brew trust`
# is idempotent, but we read the existing trust file first to keep the run
# clean (no spurious "changed") and avoid shelling out for already-trusted taps.
- name: Read existing Homebrew trust file
  ansible.builtin.slurp:
    path: "{{ ansible_facts['env'].HOME }}/.homebrew/trust.json"
  register: brew_trust_raw
  failed_when: false

- name: Determine already-trusted taps
  ansible.builtin.set_fact:
    brew_trusted_taps: >-
      {{ (brew_trust_raw.content | b64decode | from_json).trustedtaps | default([])
         if brew_trust_raw.content is defined else [] }}

- name: Trust Homebrew taps
  ansible.builtin.command:
    cmd: "{{ brew_bin.stat.path }} trust --tap {{ item }}"
  loop: "{{ homebrew_taps }}"
  when: item not in brew_trusted_taps
  register: brew_trust_result
  changed_when: brew_trust_result.rc == 0

- name: Install Homebrew formulae
  community.general.homebrew:
    name: "{{ homebrew_formulae }}"
    state: present
    update_homebrew: true
  register: formula_result
  retries: 3
  delay: 15
  until: formula_result is not failed

- name: Ensure sudoers entries for Homebrew cask installs
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/homebrew-casks
    line: "{{ item }}"
    state: present
    create: true
    owner: root
    group: wheel
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'
  become: true
  loop:
    - '%admin ALL=(root) SETENV: NOPASSWD: /usr/sbin/installer'
    # required for ansible
    - '%admin ALL=(root) SETENV: NOPASSWD: /bin/mkdir'
    # required for docker
    - '%admin ALL=(root) SETENV: NOPASSWD: /bin/chmod'
    # required for vagrant
    - '%admin ALL=(root) SETENV: NOPASSWD: /bin/ln'
    - '%admin ALL=(root) SETENV: NOPASSWD: /usr/bin/xattr'

- name: Install common Homebrew casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    greedy: true
  loop: "{{ homebrew_casks_common }}"
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed

- name: Install personal Homebrew casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    greedy: true
  loop: "{{ homebrew_casks_personal }}"
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed
  tags: personal
