---
# Kubernetes platform extras.
- name: Kubernetes extras — formulae
  community.general.homebrew:
    name:
      - kustomize   # template-free customization of k8s manifests
      - kubeseal    # client for Bitnami Sealed Secrets
      - helmfile    # declarative spec for deploying Helm releases
      - krew        # kubectl plugin manager
    state: present
  register: formula_result
  retries: 3
  delay: 15
  until: formula_result is not failed
