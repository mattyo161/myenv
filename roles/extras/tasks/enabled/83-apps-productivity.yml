---
# Productivity / communication / media apps (more personal — review per machine).
- name: Productivity & comms apps — casks
  community.general.homebrew_cask:
    name: "{{ cask }}"
    state: present
    # Adopt an app already present at the install path instead of erroring.
    install_options: adopt
  loop:
    - firefox
    - microsoft-teams
    - microsoft-outlook
    - microsoft-excel
    - microsoft-word
    - onedrive
    - zoom
    - raycast # screen manager, utility, launcher, ...
  loop_control:
    loop_var: cask
  register: cask_result
  retries: 3
  delay: 15
  until: cask_result is not failed
    # - discord
    # - grammarly-desktop
    # - vlc
    # - gimp
    # - balenaetcher
